<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoti</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0; height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: #2E4A42;
        }

        #root {
            height: 100%;
            display: flex;
            justify-content: center;
        }

        .serif { font-family: 'Cormorant Garamond', serif; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%; height: 4px;
            border-radius: 2px; outline: none; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px; height: 22px; border-radius: 50%;
            background: var(--thumb, #fff);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
        }
        input[type="range"]::-moz-range-thumb {
            width: 22px; height: 22px; border-radius: 50%;
            background: var(--thumb, #fff); border: none;
            cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ── Constants ────────────────────────────────────────────────────────────────
const FOREST = '#2E4A42';
const OCHRE  = '#C3A059';
const ASH    = '#B6B1A9';
const ROSE   = '#B28B84';
const LINEN  = '#F4F0EB';
const WHITE  = '#FFFFFF';

const CAT_COLORS = {
    mad:      { muted: '#F5C6C2', vibrant: '#8B1A10', bubble: '#D94F3D' },
    sad:      { muted: '#C5D8E8', vibrant: '#1A3D5C', bubble: '#4A80B0' },
    scared:   { muted: '#D8C8E8', vibrant: '#4A1D6B', bubble: '#8A5BB5' },
    joyful:   { muted: '#FAE8A8', vibrant: '#7A5800', bubble: '#D4A30A' },
    powerful: { muted: '#FAD8B0', vibrant: '#7A2800', bubble: '#D4732A' },
    peaceful: { muted: '#B8E0D0', vibrant: '#1A5232', bubble: '#3A9E72' },
    bad:      { muted: '#D8D5D0', vibrant: '#3D3530', bubble: '#7A7470' },
};

const EMOTIONS = [
    { id: 'mad',      label: 'Mad',      levels: { low: ['Skeptical','Annoyed','Irritated'],   mid: ['Angry','Frustrated','Resentful'],      high: ['Furious','Livid','Enraged']             }},
    { id: 'sad',      label: 'Sad',      levels: { low: ['Pensive','Disappointed','Bored'],    mid: ['Sad','Lonely','Hurt'],                  high: ['Devastated','Heartbroken','Agonized']   }},
    { id: 'scared',   label: 'Scared',   levels: { low: ['Uneasy','Nervous','Worried'],        mid: ['Afraid','Anxious','Threatened'],        high: ['Terrified','Panicked','Overwhelmed']    }},
    { id: 'joyful',   label: 'Joyful',   levels: { low: ['Content','Amused','Satisfied'],      mid: ['Happy','Cheerful','Proud'],             high: ['Ecstatic','Jubilant','Euphoric']        }},
    { id: 'powerful', label: 'Powerful', levels: { low: ['Capable','Valued','Noticed'],        mid: ['Strong','Confident','Important'],       high: ['Invincible','Empowered','Heroic']       }},
    { id: 'peaceful', label: 'Peaceful', levels: { low: ['Calm','Quiet','Thoughtful'],         mid: ['Serene','Secure','Relaxed'],            high: ['Meditative','Blissful','Harmonious']    }},
    { id: 'bad',      label: 'Bad',      levels: { low: ['Tired','Stressed','Busy'],           mid: ['Bored','Pressured','Apathetic'],        high: ['Overwhelmed','Out of Control','Depleted']}},
];

const QUOTES = [
    { text: 'Smile, breathe and go slowly.', author: 'Thich Nhat Hanh' },
    { text: "You are the sky. Everything else—it's just the weather.", author: 'Pema Chödrön' },
    { text: "The little things? The little moments? They aren't little.", author: 'Jon Kabat-Zinn' },
    { text: 'Wherever you are, be there totally.', author: 'Eckhart Tolle' },
];

// ── Helpers ──────────────────────────────────────────────────────────────────
const wordFor = (id, intensity) => {
    const cat = EMOTIONS.find(e => e.id === id);
    if (!cat) return '';
    const i = Math.round(intensity);
    if (i <= 3) return cat.levels.low[i - 1];
    if (i <= 7) return cat.levels.mid[Math.min(2, Math.floor((i - 4) * 3 / 4))];
    return cat.levels.high[i - 8];
};

const hexRgb = hex => {
    const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return r ? [parseInt(r[1],16), parseInt(r[2],16), parseInt(r[3],16)] : [0,0,0];
};

const lerp = (a, b, t) => Math.round(a + (b - a) * t);

const blendColor = (mutedHex, vibrantHex, intensity) => {
    const t = (intensity - 1) / 9;
    const [ar,ag,ab] = hexRgb(mutedHex);
    const [br,bg,bb] = hexRgb(vibrantHex);
    return `rgb(${lerp(ar,br,t)},${lerp(ag,bg,t)},${lerp(ab,bb,t)})`;
};

// ── Shared styles ────────────────────────────────────────────────────────────
const shell = {
    width: '100%', maxWidth: 430, height: '100%',
    backgroundColor: LINEN,
    display: 'flex', flexDirection: 'column',
    position: 'relative', overflow: 'hidden',
    boxShadow: '0 0 80px rgba(0,0,0,0.5)',
};

const iconBtn = (onClick, label, extra = {}) => (
    <button onClick={onClick} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 8, fontFamily: 'inherit', ...extra }}>
        {label}
    </button>
);

const primaryBtn = (label, onClick, disabled = false) => (
    <button
        onClick={onClick}
        disabled={disabled}
        style={{
            width: '100%', padding: '17px 0', borderRadius: 14, border: 'none',
            backgroundColor: disabled ? ASH : FOREST,
            color: WHITE, fontSize: 15, fontWeight: 500,
            cursor: disabled ? 'not-allowed' : 'pointer',
            fontFamily: 'inherit', letterSpacing: '0.2px',
        }}
    >{label}</button>
);

// ── IntensityCard ─────────────────────────────────────────────────────────────
function IntensityCard({ id, intensity, label, onChange }) {
    const cats      = CAT_COLORS[id];
    const cardBg    = blendColor(cats.muted, cats.vibrant, intensity);
    const light     = intensity >= 6;
    const textClr   = light ? '#fff' : FOREST;
    const subClr    = light ? 'rgba(255,255,255,0.65)' : 'rgba(46,74,66,0.45)';
    const trackClr  = light ? 'rgba(255,255,255,0.25)' : 'rgba(46,74,66,0.12)';
    const thumb     = light ? '#fff' : FOREST;
    const wordSize  = 22 + (intensity - 1) * 1.6;
    const wordWt    = intensity <= 3 ? 300 : intensity <= 7 ? 500 : 700;
    const fillPct   = ((intensity - 1) / 9 * 100).toFixed(1);

    return (
        <div style={{ backgroundColor: cardBg, borderRadius: 20, padding: '22px 22px 16px', marginBottom: 14, boxShadow: '0 4px 20px rgba(0,0,0,0.12)' }}>
            <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '1.6px', color: subClr, marginBottom: 6, textTransform: 'uppercase' }}>{label}</div>
            <div style={{ fontSize: wordSize, fontWeight: wordWt, color: textClr, marginBottom: 20, lineHeight: 1.15, minHeight: 40 }}>
                {wordFor(id, intensity)}
            </div>
            <input
                type="range" min="1" max="10" step="1"
                value={intensity}
                onChange={e => onChange(id, Number(e.target.value))}
                style={{ background: `linear-gradient(to right,${thumb} ${fillPct}%,${trackClr} ${fillPct}%)`, '--thumb': thumb, marginBottom: 6 }}
            />
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: subClr, fontWeight: 300 }}>
                <span>quiet</span>
                <span style={{ fontWeight: 500 }}>{intensity}</span>
                <span>loud</span>
            </div>
        </div>
    );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
    const [screen,      setScreen]      = useState('splash');
    const [quote,       setQuote]       = useState(QUOTES[0]);
    const [name,        setName]        = useState('');
    const [frequency,   setFrequency]   = useState(3);
    const [logPhase,    setLogPhase]    = useState(1);
    const [selectedIds, setSelectedIds] = useState([]);
    const [intensities, setIntensities] = useState({});

    useEffect(() => {
        setQuote(QUOTES[Math.floor(Math.random() * QUOTES.length)]);
    }, []);

    useEffect(() => {
        if (screen === 'splash') {
            const t = setTimeout(() => setScreen('welcome'), 2500);
            return () => clearTimeout(t);
        }
        if (screen === 'noted') {
            const t = setTimeout(() => setScreen('home'), 2500);
            return () => clearTimeout(t);
        }
    }, [screen]);

    const openLog = () => {
        setLogPhase(1); setSelectedIds([]); setIntensities({});
        setScreen('log');
    };

    const toggleCat = id =>
        setSelectedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

    const goPhase2 = () => {
        const init = {};
        selectedIds.forEach(id => { init[id] = 5; });
        setIntensities(init);
        setLogPhase(2);
    };

    const date = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
    const month = new Date().toLocaleDateString('en-US', { month: 'long' });

    // ── Screens ───────────────────────────────────────────────────────────────
    if (screen === 'splash') return (
        <div style={shell}>
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center' }}>
                <h1 className="serif" style={{ fontSize: 56, color: FOREST, margin: '0 0 8px', fontStyle: 'italic' }}>Emoti</h1>
                <p style={{ fontSize: 10, letterSpacing: '0.4em', textTransform: 'uppercase', opacity: 0.35, color: FOREST, margin: 0 }}>A moment to notice</p>
            </div>
        </div>
    );

    if (screen === 'welcome') return (
        <div style={shell}>
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '60px 40px 40px' }}>
                <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <div style={{ textAlign: 'center', maxWidth: 280 }}>
                        <h2 className="serif" style={{ fontSize: 26, color: FOREST, lineHeight: 1.45, fontStyle: 'italic', margin: '0 0 20px' }}>"{quote.text}"</h2>
                        <div style={{ width: 40, height: 1, backgroundColor: FOREST, opacity: 0.2, margin: '0 auto 14px' }} />
                        <p style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.15em', opacity: 0.5, color: FOREST, margin: 0 }}>— {quote.author}</p>
                    </div>
                </div>
                <div style={{ textAlign: 'center', paddingBottom: 8 }}>
                    <button onClick={() => setScreen('onboarding-name')} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 28, opacity: 0.35, padding: 12, color: FOREST, lineHeight: 1 }}>→</button>
                </div>
            </div>
        </div>
    );

    if (screen === 'onboarding-name') return (
        <div style={shell}>
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '60px 40px 40px' }}>
                <div style={{ flex: 1 }}>
                    <p style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.2em', opacity: 0.4, color: FOREST, margin: '0 0 16px' }}>Onboarding 1/2</p>
                    <h2 className="serif" style={{ fontSize: 30, color: FOREST, margin: '0 0 32px', fontStyle: 'italic' }}>What should we call you?</h2>
                    <input
                        type="text" value={name} onChange={e => setName(e.target.value)}
                        placeholder="Your name"
                        style={{ display: 'block', width: '100%', background: 'transparent', border: 'none', borderBottom: `1px solid ${ASH}`, padding: '12px 0', fontSize: 24, color: FOREST, outline: 'none', fontFamily: 'inherit' }}
                    />
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                    {primaryBtn('Continue', () => setScreen('onboarding-freq'))}
                    <button onClick={() => setScreen('onboarding-freq')} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.15em', opacity: 0.4, color: FOREST, padding: 8, fontFamily: 'inherit' }}>Skip</button>
                </div>
            </div>
        </div>
    );

    if (screen === 'onboarding-freq') return (
        <div style={shell}>
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '60px 40px 40px' }}>
                <div style={{ flex: 1 }}>
                    <p style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.2em', opacity: 0.4, color: FOREST, margin: '0 0 16px' }}>Onboarding 2/2</p>
                    <h2 className="serif" style={{ fontSize: 30, color: FOREST, margin: '0 0 12px', fontStyle: 'italic' }}>Frequency of Pause</h2>
                    <p style={{ opacity: 0.55, fontSize: 15, fontStyle: 'italic', lineHeight: 1.6, margin: '0 0 36px', color: FOREST }}>How many times a day would you like a reminder to notice?</p>
                    <div style={{ display: 'flex', justifyContent: 'space-between', backgroundColor: 'rgba(255,255,255,0.5)', borderRadius: 999, padding: 6, marginBottom: 12 }}>
                        {[1,3,5,8].map(n => (
                            <button key={n} onClick={() => setFrequency(n)} style={{
                                width: 52, height: 52, borderRadius: '50%', border: 'none',
                                backgroundColor: frequency === n ? FOREST : 'transparent',
                                color: frequency === n ? WHITE : FOREST,
                                fontSize: 18, fontWeight: 500, cursor: 'pointer', opacity: frequency === n ? 1 : 0.4,
                                fontFamily: 'inherit',
                            }}>{n}</button>
                        ))}
                    </div>
                    <p style={{ textAlign: 'center', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.1em', opacity: 0.3, color: FOREST }}>The bell will chime at random moments.</p>
                </div>
                {primaryBtn('Begin Practice', () => setScreen('home'))}
            </div>
        </div>
    );

    if (screen === 'home') return (
        <div style={shell}>
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '60px 28px 36px', overflowY: 'auto' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 40 }}>
                    <div>
                        <p style={{ fontSize: 11, opacity: 0.4, textTransform: 'uppercase', letterSpacing: '0.2em', margin: '0 0 4px', color: FOREST }}>{date}</p>
                        <h2 className="serif" style={{ fontSize: 30, color: FOREST, margin: 0, fontStyle: 'italic' }}>Welcome, {name || 'friend'}</h2>
                    </div>
                    <button onClick={() => setScreen('settings')} style={{ background: 'none', border: 'none', cursor: 'pointer', opacity: 0.4, padding: 8, fontSize: 20 }}>⚙</button>
                </div>
                <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', marginBottom: 32 }}>
                    <div style={{ width: 180, height: 180, borderRadius: '50%', border: `1px solid rgba(46,74,66,0.15)`, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 28 }}>
                        <div style={{ width: 140, height: 140, borderRadius: '50%', backgroundColor: 'rgba(255,255,255,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20, textAlign: 'center' }}>
                            <p style={{ fontSize: 13, fontStyle: 'italic', opacity: 0.55, lineHeight: 1.5, color: FOREST, margin: 0 }}>
                                Ready to notice?<br/>
                                <span style={{ fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.2em', opacity: 0.5 }}>or wait for next bell</span>
                            </p>
                        </div>
                    </div>
                    <button onClick={openLog} style={{ padding: '14px 32px', borderRadius: 999, border: `1.5px solid ${ASH}`, backgroundColor: 'transparent', color: FOREST, fontSize: 14, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit' }}>
                        Check-in Now
                    </button>
                </div>
                <button onClick={() => setScreen('month-summary')} style={{ backgroundColor: 'rgba(255,255,255,0.55)', borderRadius: 24, padding: '20px 24px', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'space-between', textAlign: 'left', width: '100%', fontFamily: 'inherit' }}>
                    <div>
                        <p style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.2em', opacity: 0.4, color: FOREST, margin: '0 0 10px' }}>Month Summary</p>
                        <span className="serif" style={{ fontSize: 36, color: FOREST }}>12</span>
                        <p style={{ fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.15em', opacity: 0.4, color: FOREST, margin: '2px 0 0' }}>Observations</p>
                    </div>
                    <span style={{ fontSize: 22, opacity: 0.25, color: FOREST }}>›</span>
                </button>
            </div>
        </div>
    );

    if (screen === 'month-summary') return (
        <div style={shell}>
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '60px 28px 36px', overflowY: 'auto', gap: 24 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <button onClick={() => setScreen('home')} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 22, color: FOREST, padding: 4 }}>←</button>
                    <h3 className="serif" style={{ fontSize: 20, fontStyle: 'italic', color: FOREST, margin: 0 }}>Awareness Map</h3>
                    <div style={{ width: 36 }} />
                </div>
                <div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 12 }}>
                        <p style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.2em', opacity: 0.4, color: FOREST, margin: 0 }}>Current Rhythm</p>
                        <p style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.1em', opacity: 0.3, color: FOREST, margin: 0 }}>{month}</p>
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 6 }}>
                        {[...Array(31)].map((_,i) => (
                            <div key={i} style={{ aspectRatio: '1', borderRadius: 6, backgroundColor: i%4===0 ? 'rgba(46,74,66,0.4)' : i%7===0 ? 'rgba(195,160,89,0.35)' : 'rgba(182,177,169,0.15)' }} />
                        ))}
                    </div>
                </div>
                <div style={{ backgroundColor: 'rgba(255,255,255,0.5)', borderRadius: 24, padding: '24px 20px' }}>
                    <p style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.2em', opacity: 0.4, color: FOREST, margin: '0 0 20px' }}>Top Sensations</p>
                    {[{l:'Cheerful',c:5},{l:'Serene',c:4},{l:'Anxious',c:2},{l:'Irritated',c:1}].map(item => (
                        <div key={item.l} style={{ marginBottom: 14 }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 6, color: FOREST }}>
                                <span style={{ fontStyle: 'italic' }}>{item.l}</span>
                                <span style={{ opacity: 0.4 }}>{item.c}x</span>
                            </div>
                            <div style={{ height: 5, backgroundColor: 'rgba(182,177,169,0.2)', borderRadius: 999 }}>
                                <div style={{ height: '100%', borderRadius: 999, backgroundColor: FOREST, width: `${(item.c/5)*100}%`, opacity: 0.7 }} />
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        </div>
    );

    if (screen === 'log') {
        const selCats = selectedIds.map(id => EMOTIONS.find(e => e.id === id)).filter(Boolean);

        return (
            <div style={shell}>
                {/* Header */}
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '54px 24px 12px', flexShrink: 0 }}>
                    <button onClick={() => logPhase === 2 ? setLogPhase(1) : setScreen('home')} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 24, color: FOREST, lineHeight: 1, padding: 4 }}>←</button>
                    <span style={{ fontSize: 14, fontWeight: 500, color: FOREST }}>{logPhase === 1 ? 'What are you feeling?' : 'Set the volume'}</span>
                    <div style={{ width: 36 }} />
                </div>

                {/* Phase 1 — multi-select bubbles */}
                {logPhase === 1 && (
                    <>
                        <div style={{ flex: 1, overflowY: 'auto', padding: '4px 20px 20px' }}>
                            <p style={{ fontSize: 13, color: ASH, fontWeight: 300, lineHeight: 1.6, margin: '0 0 20px 4px' }}>
                                Select everything that's present. You can feel more than one thing.
                            </p>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                                {EMOTIONS.map(em => {
                                    const sel = selectedIds.includes(em.id);
                                    return (
                                        <button key={em.id} onClick={() => toggleCat(em.id)} style={{
                                            padding: '28px 16px', borderRadius: 16,
                                            border: sel ? '2px solid rgba(255,255,255,0.45)' : '2px solid transparent',
                                            backgroundColor: sel ? CAT_COLORS[em.id].bubble : WHITE,
                                            color: sel ? WHITE : FOREST,
                                            fontSize: 18, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit',
                                            boxShadow: '0 2px 8px rgba(0,0,0,0.07)',
                                        }}>{em.label}</button>
                                    );
                                })}
                            </div>
                        </div>
                        <div style={{ padding: '12px 24px 40px', flexShrink: 0 }}>
                            {primaryBtn(
                                selectedIds.length === 0 ? 'Select at least one' : 'Continue →',
                                goPhase2,
                                selectedIds.length === 0
                            )}
                        </div>
                    </>
                )}

                {/* Phase 2 — intensity sliders */}
                {logPhase === 2 && (
                    <>
                        <div style={{ flex: 1, overflowY: 'auto', padding: '4px 20px 20px' }}>
                            <p style={{ fontSize: 13, color: ASH, fontWeight: 300, lineHeight: 1.6, margin: '0 0 16px 4px' }}>
                                Drag to find the word that matches your inner volume.
                            </p>
                            {selCats.map(cat => (
                                <IntensityCard
                                    key={cat.id}
                                    id={cat.id}
                                    label={cat.label}
                                    intensity={intensities[cat.id] ?? 5}
                                    onChange={(id, val) => setIntensities(prev => ({ ...prev, [id]: val }))}
                                />
                            ))}
                            <div style={{ height: 80 }} />
                        </div>
                        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, padding: '12px 24px 40px', backgroundColor: LINEN }}>
                            {primaryBtn('Save check-in', () => setScreen('noted'))}
                        </div>
                    </>
                )}
            </div>
        );
    }

    if (screen === 'noted') return (
        <div style={shell}>
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center', padding: 48 }}>
                <div style={{ fontSize: 64, marginBottom: 20, opacity: 0.25, color: FOREST }}>✓</div>
                <h2 className="serif" style={{ fontSize: 40, color: FOREST, fontStyle: 'italic', margin: '0 0 12px' }}>Noted.</h2>
                <p style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.2em', opacity: 0.45, color: FOREST, margin: 0 }}>The sensation is seen.</p>
            </div>
        </div>
    );

    if (screen === 'settings') return (
        <div style={shell}>
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '60px 24px 40px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 32 }}>
                    <button onClick={() => setScreen('home')} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 22, opacity: 0.5, padding: 4, color: FOREST }}>×</button>
                    <h3 className="serif" style={{ fontSize: 20, fontStyle: 'italic', color: FOREST, margin: 0 }}>Settings</h3>
                    <div style={{ width: 36 }} />
                </div>
                <div style={{ backgroundColor: 'rgba(255,255,255,0.5)', borderRadius: 20, padding: '18px 22px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                    <span style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.15em', opacity: 0.5, color: FOREST }}>Daily Reminders</span>
                    <span className="serif" style={{ fontSize: 26, color: FOREST }}>{frequency}</span>
                </div>
                <button style={{ backgroundColor: 'rgba(178,139,132,0.12)', borderRadius: 20, padding: '18px 22px', border: 'none', color: ROSE, cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center', width: '100%', fontFamily: 'inherit', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.15em', fontWeight: 600 }}>
                    Clear Records <span>〜</span>
                </button>
            </div>
        </div>
    );

    return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
